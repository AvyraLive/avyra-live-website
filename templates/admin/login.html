<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVYRA-LIVE — Connexion</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="AVYRA-LIVE" style="height:48px;margin-bottom:24px;">
    <h1>Back-office</h1>
    <p>Connectez-vous pour accéder aux outils de gestion.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group" style="text-align:left;">
        <label for="username">Identifiant</label>
        <input type="text" id="username" name="username" class="form-control" required autofocus>
      </div>
      <div class="form-group" style="text-align:left;">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Se connecter</button>
    </form>
    <p style="margin-top:24px;font-size:0.85rem;"><a href="{{ url_for('index') }}">← Retour au site</a></p>
  </div>
</div>
</body>
</html>
